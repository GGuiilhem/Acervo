name: Build and publish Windows release

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "tauri.conf.json"
      - "src/**"
      - "frontend/**"
      - "icons/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Read application version
        shell: pwsh
        run: |
          $config = Get-Content tauri.conf.json -Raw | ConvertFrom-Json
          "VERSION=$($config.version)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Ensure version is unpublished
        shell: pwsh
        run: |
          gh release view "v$env:VERSION" --repo "$env:GITHUB_REPOSITORY" 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw "Release v$env:VERSION already exists. Increase the version before publishing another update."
          }
          exit 0

      - name: Install Tauri CLI
        shell: pwsh
        run: cargo install tauri-cli --version "^2" --locked

      - name: Run tests
        run: cargo test --locked

      - name: Build portable executable
        run: cargo tauri build --no-bundle

      - name: Prepare portable asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item target/release/acervo.exe dist/Acervo-portable.exe

      - name: Build MSI installer
        run: cargo tauri bundle --bundles msi

      - name: Prepare installer asset
        shell: pwsh
        run: |
          $msi = Get-ChildItem target/release/bundle/msi/*.msi | Select-Object -First 1
          if (-not $msi) { throw "MSI installer was not generated." }
          Copy-Item $msi.FullName dist/Acervo-setup.msi

      - name: Create GitHub Release
        shell: pwsh
        run: |
          gh release create "v$env:VERSION" `
            dist/Acervo-portable.exe `
            dist/Acervo-setup.msi `
            --repo "$env:GITHUB_REPOSITORY" `
            --target "$env:GITHUB_SHA" `
            --title "Acervo $env:VERSION" `
            --generate-notes
